<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Life Dashboard</title>
    <script type="text/javascript">
      // Перенаправляем на index.html с сохранением пути
      const pathSegments = location.pathname.split("/");
      const repoName = pathSegments[1] || "life-dashboard";
      const restPath = pathSegments.slice(2).join("/");

      // Сохраняем путь для React Router
      sessionStorage.setItem("redirectPath", "/" + restPath);

      // Перенаправляем на главную
      window.location.href = "/" + repoName + "/";
    </script>
  </head>
  <body>
    <p>Перенаправление...</p>
  </body>
</html>
